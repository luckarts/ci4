name: Deploy

on:
  push:
    paths:
      - 'backend/app/**'
      - 'backend/composer.json'
      - 'backend/composer.lock'

  # Déploiement manuel
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: staging
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer:v2

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor/
          key: vendor-${{ hashFiles('backend/composer.lock') }}
          restore-keys: vendor-

      - name: Install Production Dependencies
        run: composer install --no-dev --optimize-autoloader --no-scripts

      - name: Build Assets (if needed)
        run: |
          # Ajoutez vos commandes de build ici
          # npm run build, etc.
          echo "Build completed"

      - name: Deploy to Staging
        run: |
          # Remplacez par vos commandes de déploiement
          echo "Deploying to staging..."
          # rsync, scp, ou autre méthode de déploiement

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment: production
    needs: [deploy-staging]
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          # Commandes de déploiement production
