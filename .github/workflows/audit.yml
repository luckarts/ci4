name: Security Audit

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'backend/**'

  pull_request:
    branches: [main, master, develop]
    paths:
      - 'backend/**'

  # Déclenchement manuel uniquement
  workflow_dispatch:
    inputs:
      audit_level:
        description: 'Niveau audit sécurité'
        required: true
        default: 'standard'
        type: choice
        options:
          - quick
          - standard
          - full

jobs:
  # Audit rapide sur PR
  quick-audit:
    name: Quick Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.inputs.audit_level == 'quick'
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: audit-quick-${{ hashFiles('backend/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-dev --no-scripts --optimize-autoloader

      - name: Quick Security Audit
        run: |
          composer audit \
            --no-dev \
            --format="json" \
            --no-ansi > quick-audit.json || echo "Audit completed with findings"

      - name: Check Critical Issues Only
        run: |
          if [ -f quick-audit.json ]; then
            echo "🔍 Vérification des vulnérabilités critiques..."
            if jq -e '[.advisories | to_entries[] | .value[] | select(.severity == "critical")] | length > 0' quick-audit.json; then
              echo "🚨 Vulnérabilités critiques détectées!"
              jq '[.advisories | to_entries[] | .value[] | select(.severity == "critical")]' quick-audit.json
              exit 1
            else
              echo "✅ Aucune vulnérabilité critique"
            fi
          fi

      - name: Upload Quick Audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quick-security-audit
          path: backend/quick-audit.json

  # Audit complet sur push develop/main/master
  full-audit:
    name: Full Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    if: >
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/develop')) ||
      github.event.inputs.audit_level == 'full' ||
      github.event.inputs.audit_level == 'standard'
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: audit-full-${{ hashFiles('backend/composer.lock') }}

      - name: Cache Vendor
        uses: actions/cache@v4
        with:
          path: backend/vendor/
          key: vendor-audit-${{ hashFiles('backend/composer.lock') }}

      - name: Install dependencies
        run: composer install --optimize-autoloader

      - name: Full Security Audit
        run: |
          echo "🔍 Audit sécurité complet..."
          composer audit \
            --no-dev \
            --abandoned="report" \
            --format="json" \
            --no-ansi > full-security-audit.json || echo "Audit completed with findings"

      - name: Analyze Security Results
        run: |
          if [ -f full-security-audit.json ]; then
            echo "📊 Résultats de l'audit:"

            TOTAL=$(jq -r '[.advisories | to_entries[] | .value[]] | length' full-security-audit.json)
            CRITICAL=$(jq -r '[.advisories | to_entries[] | .value[] | select(.severity == "critical")] | length' full-security-audit.json)
            HIGH=$(jq -r '[.advisories | to_entries[] | .value[] | select(.severity == "high")] | length' full-security-audit.json)
            MEDIUM=$(jq -r '[.advisories | to_entries[] | .value[] | select(.severity == "medium")] | length' full-security-audit.json)

            echo "Total: $TOTAL vulnérabilités"
            echo "Critiques: $CRITICAL"
            echo "Élevées: $HIGH"
            echo "Moyennes: $MEDIUM"

            # Échec si critiques ou élevées
            if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
              echo "🚨 Vulnérabilités critiques ou élevées détectées!"
              echo "SECURITY_FAILED=true" >> $GITHUB_ENV
              exit 1
            else
              echo "✅ Aucune vulnérabilité critique ou élevée"
            fi
          fi

      - name: Create Security Issue
        if: failure() && env.SECURITY_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '🚨 **Audit de sécurité échoué**\n\n';

            if (fs.existsSync('backend/full-security-audit.json')) {
              try {
                const audit = JSON.parse(fs.readFileSync('backend/full-security-audit.json', 'utf8'));
                const allAdvisories = Object.values(audit.advisories || {}).flat();
                const critical = allAdvisories.filter(a => a.severity === 'critical');
                const high = allAdvisories.filter(a => a.severity === 'high');

                if (critical.length > 0) {
                  body += `## 🔥 Vulnérabilités critiques (${critical.length})\n`;
                  critical.forEach(vuln => {
                    body += `- **${vuln.title}** dans ${vuln.packageName}\n`;
                  });
                  body += '\n';
                }

                if (high.length > 0) {
                  body += `## ⚠️ Vulnérabilités élevées (${high.length})\n`;
                  high.forEach(vuln => {
                    body += `- **${vuln.title}** dans ${vuln.packageName}\n`;
                  });
                }
              } catch (e) {
                body += 'Erreur lors de la lecture du rapport d\'audit.\n';
              }
            }

            body += `\n**Branch:** ${context.ref}\n`;
            body += `**Commit:** ${context.sha}\n`;
            body += `**Workflow:** [${context.runId}](${context.payload.repository.html_url}/actions/runs/${context.runId})`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🛡️ Vulnérabilités de sécurité - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['security', 'high-priority']
            });

      - name: Upload Full Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-security-audit-${{ github.run_number }}
          path: backend/full-security-audit.json
