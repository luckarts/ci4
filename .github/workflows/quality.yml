name: Code Quality

on:
  pull_request:
  push:

permissions: {}

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1  # v2
        with:
          php-version: 8.3
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.composer/cache
          key: composer-quality-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Cache Vendor
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: backend/vendor/
          key: vendor-quality-${{ hashFiles('backend/composer.lock') }}
          restore-keys: vendor-

      - name: Install dependencies
        run: composer install --optimize-autoloader

      - name: PHPStan Analysis
        run: vendor/bin/phpstan analyse app/ --error-format=github --no-progress --memory-limit=-1
