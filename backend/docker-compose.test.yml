version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ci4_oauth_test
      POSTGRES_USER: ci4
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ci4 -d ci4_oauth_test"]
      interval: 5s
      timeout: 5s
      retries: 5
